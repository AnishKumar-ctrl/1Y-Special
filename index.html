<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Anniversary, Vaishnavi ✨</title>
    <meta name="description" content="A cinematic first anniversary gift for Vaishnavi. July 20, 2026.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700&family=Nunito:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&display=swap&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js">
    </script>

    <style>
        :root {
            --cream: #faf6f0;
            --warm-white: #fffdf8;
            --soft-coral: #f2b8a2;
            --muted-pink: #efc8c2;
            --rose-gold: #c88b7a;
            --chocolate: #49362d;
            --chocolate-light: #6b5244;
            --chocolate-lighter: #8b6f5e;
            --font-heading: 'Playfair Display', Georgia, 'Times New Roman', serif;
            --font-body: 'Nunito', 'Segoe UI', system-ui, sans-serif;
            --transition-smooth: 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
            --transition-spring: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            --transition-bounce: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            --nav-height: 70px;
            --radius-full: 9999px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            overflow: hidden;
            height: 100%;
        }

        body {
            font-family: var(--font-body);
            background: var(--cream);
            color: var(--chocolate);
            line-height: 1.7;
            overflow: hidden;
            cursor: none;
            height: 100vh;
            width: 100vw;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        /* ──────────────── Background Gradient Layers ──────────────── */
        .bg-layer {
            position: fixed;
            inset: -10%;
            pointer-events: none;
            z-index: 0;
            will-change: transform;
            background-size: 300% 300%;
            animation-duration: 20s;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
            animation-direction: alternate;
        }
        .bg-layer--deep {
            background: radial-gradient(ellipse at 40% 50%, #fdf5ee 0%, #faf3ea 30%, #f7e8dd 60%, #fef9f4 100%);
            background-size: 280% 280%;
            animation-name: bgShiftDeep;
            animation-duration: 26s;
            z-index: 0;
        }
        .bg-layer--mid {
            background: radial-gradient(ellipse at 65% 35%, #fef0e8 0%, transparent 55%),
                radial-gradient(ellipse at 30% 70%, #fce4d6 0%, transparent 50%),
                radial-gradient(ellipse at 55% 45%, #faf6f0 0%, transparent 70%);
            background-size: 320% 320%;
            animation-name: bgShiftMid;
            animation-duration: 18s;
            opacity: 0.7;
            z-index: 1;
        }
        .bg-layer--top {
            background: radial-gradient(ellipse at 50% 60%, rgba(242, 184, 162, 0.25) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 30%, rgba(239, 200, 194, 0.2) 0%, transparent 45%),
                radial-gradient(ellipse at 25% 80%, rgba(200, 139, 122, 0.12) 0%, transparent 40%);
            background-size: 350% 350%;
            animation-name: bgShiftTop;
            animation-duration: 22s;
            z-index: 2;
            opacity: 0.8;
        }
        .bg-layer--glow {
            background: radial-gradient(circle at 50% 45%, rgba(255, 253, 248, 0.6) 0%, transparent 60%),
                radial-gradient(circle at 50% 55%, rgba(242, 184, 162, 0.15) 0%, transparent 50%);
            background-size: 200% 200%;
            animation-name: bgGlowPulse;
            animation-duration: 8s;
            z-index: 3;
            opacity: 0.6;
        }

        @keyframes bgShiftDeep {
            0% {
                background-position: 0% 0%;
            }
            100% {
                background-position: 100% 80%;
            }
        }
        @keyframes bgShiftMid {
            0% {
                background-position: 10% 30%;
            }
            100% {
                background-position: 90% 70%;
            }
        }
        @keyframes bgShiftTop {
            0% {
                background-position: 60% 20%;
            }
            100% {
                background-position: 30% 85%;
            }
        }
        @keyframes bgGlowPulse {
            0%,
            100% {
                background-position: 45% 50%;
                opacity: 0.5;
            }
            50% {
                background-position: 55% 48%;
                opacity: 0.75;
            }
        }

        /* ──────────────── Floating Decorations Container ──────────────── */
        .floating-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 4;
            overflow: visible;
        }
        .floating-el {
            position: absolute;
            pointer-events: none;
            will-change: transform;
            transition: none;
            font-size: var(--el-size);
            opacity: var(--el-opacity, 0.5);
            animation: floatWander var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
            filter: blur(var(--blur, 0px));
        }
        @keyframes floatWander {
            0%,
            100% {
                transform: translateY(0) translateX(0) rotate(0deg) scale(1);
            }
            20% {
                transform: translateY(calc(var(--drift-y) * -0.7)) translateX(calc(var(--drift-x) * 0.5)) rotate(calc(var(
                                    rotate) * 0.5)) scale(1.06);
            }
            40% {
                transform: translateY(calc(var(--drift-y) * -0.3)) translateX(calc(var(--drift-x) * -0.4)) rotate(calc(var(
                                    rotate) * -0.3)) scale(0.94);
            }
            60% {
                transform: translateY(calc(var(--drift-y) * -0.9)) translateX(calc(var(--drift-x) * 0.7)) rotate(calc(var(
                                    rotate) * 0.8)) scale(1.04);
            }
            80% {
                transform: translateY(calc(var(--drift-y) * -0.5)) translateX(calc(var(--drift-x) * -0.6)) rotate(calc(var(
                                    rotate) * -0.6)) scale(0.97);
            }
        }

        /* ──────────────── Main Hero Content ──────────────── */
        .hero-wrapper {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
            padding: 24px;
        }
        .hero-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 650px;
            pointer-events: none;
        }
        .hero-content>* {
            pointer-events: auto;
        }

        /* Date Badge */
        .date-badge {
            display: inline-block;
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 0.7rem;
            letter-spacing: 3.5px;
            text-transform: uppercase;
            color: var(--rose-gold);
            background: rgba(255, 253, 248, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(200, 139, 122, 0.25);
            border-radius: var(--radius-full);
            padding: 10px 24px;
            margin-bottom: 28px;
            opacity: 0;
            box-shadow: 0 2px 16px rgba(73, 54, 45, 0.05);
        }
        @media (min-width: 768px) {
            .date-badge {
                font-size: 0.78rem;
                letter-spacing: 4px;
                padding: 12px 28px;
                margin-bottom: 32px;
            }
        }

        /* Title */
        .hero-title {
            font-family: var(--font-heading);
            font-size: clamp(2.2rem, 5.5vw, 4.2rem);
            font-weight: 700;
            color: var(--chocolate);
            line-height: 1.15;
            letter-spacing: -0.4px;
            margin-bottom: 16px;
            opacity: 0;
        }
        .hero-title .word {
            display: inline-block;
            opacity: 0;
            transform: translateY(30px);
            will-change: transform, opacity;
            margin-right: 0.22em;
            white-space: pre;
        }
        .hero-title .word.highlight {
            color: var(--rose-gold);
            font-style: italic;
            position: relative;
        }
        .hero-title .word.highlight::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 0;
            width: 100%;
            height: 6px;
            background: rgba(242, 184, 162, 0.35);
            border-radius: var(--radius-full);
            z-index: -1;
        }
        @media (min-width: 768px) {
            .hero-title {
                font-size: clamp(3rem, 6vw, 4.8rem);
                margin-bottom: 20px;
            }
            .hero-title .word.highlight::after {
                height: 8px;
                bottom: 4px;
            }
        }

        /* Subtitle */
        .hero-subtitle {
            font-family: var(--font-body);
            font-size: 1rem;
            font-weight: 400;
            color: var(--chocolate-lighter);
            letter-spacing: 0.8px;
            margin-bottom: 36px;
            opacity: 0;
            line-height: 1.6;
        }
        @media (min-width: 768px) {
            .hero-subtitle {
                font-size: 1.15rem;
                margin-bottom: 44px;
                letter-spacing: 1px;
            }
        }

        /* CTA Button */
        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 1.2px;
            color: var(--warm-white);
            background: linear-gradient(135deg, var(--soft-coral) 0%, #e0a08a 40%, var(--rose-gold) 100%);
            border: none;
            border-radius: var(--radius-full);
            padding: 15px 36px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 6px 28px rgba(200, 139, 122, 0.35), 0 2px 8px rgba(200, 139, 122, 0.2);
            opacity: 0;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            transition: box-shadow var(--transition-smooth);
            pointer-events: auto;
            z-index: 12;
        }
        .cta-button:hover {
            box-shadow: 0 10px 36px rgba(200, 139, 122, 0.5), 0 4px 14px rgba(200, 139, 122, 0.3);
            transform: translateY(-2px);
        }
        .cta-button:active {
            transform: scale(0.95);
            transition: transform 0.15s ease;
        }
        .cta-button::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            transform: translateX(-100%);
            transition: transform 0.7s ease;
            pointer-events: none;
        }
        .cta-button:hover::after {
            transform: translateX(100%);
        }
        .cta-button .cta-arrow {
            display: inline-block;
            transition: transform var(--transition-smooth);
            font-size: 1.1rem;
        }
        .cta-button:hover .cta-arrow {
            transform: translateX(4px);
        }
        .cta-pulse-ring {
            position: absolute;
            inset: -6px;
            border-radius: var(--radius-full);
            border: 2px solid rgba(242, 184, 162, 0.5);
            pointer-events: none;
            animation: pulseRing 2.2s ease-out infinite;
            z-index: -1;
        }
        @keyframes pulseRing {
            0% {
                transform: scale(1);
                opacity: 0.7;
            }
            100% {
                transform: scale(1.35);
                opacity: 0;
            }
        }
        @media (min-width: 768px) {
            .cta-button {
                font-size: 1.05rem;
                padding: 17px 42px;
                gap: 12px;
            }
        }

        /* ──────────────── Music Toggle ──────────────── */
        .music-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 20;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 253, 248, 0.65);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(200, 139, 122, 0.25);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            opacity: 0;
            pointer-events: auto;
            box-shadow: 0 4px 18px rgba(73, 54, 45, 0.06);
            transition: all var(--transition-smooth);
            -webkit-tap-highlight-color: transparent;
            color: var(--chocolate-lighter);
        }
        .music-toggle:hover {
            background: rgba(255, 253, 248, 0.85);
            box-shadow: 0 6px 24px rgba(73, 54, 45, 0.1);
            transform: scale(1.08);
            border-color: rgba(200, 139, 122, 0.4);
        }
        .music-toggle.active {
            color: var(--rose-gold);
            border-color: rgba(200, 139, 122, 0.5);
            box-shadow: 0 0 0 8px rgba(242, 184, 162, 0.15);
            animation: musicPulse 2s ease-in-out infinite;
        }
        @keyframes musicPulse {
            0%,
            100% {
                box-shadow: 0 0 0 4px rgba(242, 184, 162, 0.2);
            }
            50% {
                box-shadow: 0 0 0 16px rgba(242, 184, 162, 0);
            }
        }
        .music-toggle .music-icon {
            transition: transform var(--transition-spring);
            display: inline-block;
        }
        .music-toggle.active .music-icon {
            animation: noteBounce 0.6s ease-in-out;
        }
        @keyframes noteBounce {
            0%,
            100% {
                transform: scale(1);
            }
            40% {
                transform: scale(1.4) rotate(-10deg);
            }
            70% {
                transform: scale(0.9) rotate(5deg);
            }
        }
        @media (max-width: 480px) {
            .music-toggle {
                top: 16px;
                right: 16px;
                width: 38px;
                height: 38px;
                font-size: 1rem;
            }
        }

        /* ──────────────── Glass Bottom Navigation ──────────────── */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(255, 253, 248, 0.7);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            border: 1px solid rgba(200, 139, 122, 0.18);
            border-radius: var(--radius-full);
            padding: 8px 18px;
            display: flex;
            gap: 4px;
            align-items: center;
            box-shadow: 0 8px 32px rgba(73, 54, 45, 0.07), 0 1px 0 rgba(255, 255, 255, 0.5) inset;
            opacity: 0;
            pointer-events: auto;
            transition: box-shadow var(--transition-smooth), transform var(--transition-smooth);
        }
        .bottom-nav:hover {
            box-shadow: 0 12px 40px rgba(73, 54, 45, 0.12), 0 1px 0 rgba(255, 255, 255, 0.5) inset;
            transform: translateX(-50%) translateY(-3px);
        }
        .nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted-pink);
            opacity: 0.5;
            transition: all var(--transition-smooth);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .nav-dot.active {
            width: 22px;
            border-radius: var(--radius-full);
            background: var(--rose-gold);
            opacity: 1;
        }
        .nav-dot:hover {
            opacity: 0.8;
            transform: scale(1.3);
        }
        .nav-label {
            font-family: var(--font-body);
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--chocolate-lighter);
            padding: 0 8px;
            opacity: 0.7;
            pointer-events: none;
        }
        @media (max-width: 480px) {
            .bottom-nav {
                bottom: 14px;
                padding: 6px 14px;
                gap: 3px;
            }
            .nav-label {
                font-size: 0.6rem;
                letter-spacing: 1.5px;
                padding: 0 4px;
            }
        }

        /* ──────────────── Custom Sparkle Cursor ──────────────── */
        .cursor-dot {
            position: fixed;
            top: 0;
            left: 0;
            width: 7px;
            height: 7px;
            background: var(--rose-gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
            transition: width 0.2s ease, height 0.2s ease, background 0.2s ease;
            mix-blend-mode: difference;
            will-change: transform;
        }
        .cursor-dot.hovering {
            width: 18px;
            height: 18px;
            background: var(--soft-coral);
            mix-blend-mode: normal;
            box-shadow: 0 0 22px rgba(242, 184, 162, 0.7), 0 0 44px rgba(242, 184, 162, 0.35);
        }
        .cursor-ring {
            position: fixed;
            top: 0;
            left: 0;
            width: 34px;
            height: 34px;
            border: 1.4px solid rgba(200, 139, 122, 0.45);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99998;
            transform: translate(-50%, -50%);
            transition: width 0.3s ease, height 0.3s ease, border-color 0.3s ease;
            will-change: transform;
        }
        .cursor-ring.hovering {
            width: 48px;
            height: 48px;
            border-color: rgba(242, 184, 162, 0.75);
            border-width: 2px;
            box-shadow: 0 0 28px rgba(242, 184, 162, 0.3);
        }
        .sparkle-particle {
            position: fixed;
            pointer-events: none;
            z-index: 99997;
            border-radius: 50%;
            will-change: transform, opacity;
            animation: sparkleFade 0.7s ease-out forwards;
        }
        @keyframes sparkleFade {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--sx), var(--sy)) scale(0);
            }
        }

        /* Hide custom cursor on touch devices */
        @media (max-width: 768px),
        (hover: none) and (pointer: coarse) {
            .cursor-dot,
            .cursor-ring,
            .sparkle-particle {
                display: none !important;
            }
            body {
                cursor: auto;
            }
        }

        /* ──────────────── Transition Overlay ──────────────── */
        .transition-overlay {
            position: fixed;
            z-index: 99990;
            pointer-events: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #fdf0e8 0%, #fce4d6 30%, #fef5ef 60%, #faf6f0 100%);
            width: 120px;
            height: 120px;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            will-change: transform, opacity;
            box-shadow: 0 0 0 0 rgba(242, 184, 162, 0.5);
        }
        .transition-overlay.active {
            pointer-events: all;
        }

        /* ──────────────── Responsive Adjustments ──────────────── */
        @media (max-width: 480px) {
            .hero-wrapper {
                padding: 16px;
            }
            .floating-el {
                animation-duration: calc(var(--dur) * 1.4);
            }
        }
    </style>
</head>
<body>

    <!-- ════════════ Background Gradient Layers ════════════ -->
    <div class="bg-layer bg-layer--deep" aria-hidden="true"></div>
    <div class="bg-layer bg-layer--mid" aria-hidden="true"></div>
    <div class="bg-layer bg-layer--top" aria-hidden="true"></div>
    <div class="bg-layer bg-layer--glow" aria-hidden="true"></div>

    <!-- ════════════ Floating Decorations ════════════ -->
    <div class="floating-container" id="floatingContainer" aria-hidden="true">
        <!-- Populated by JavaScript for performance and variety -->
    </div>

    <!-- ════════════ Main Hero Content ════════════ -->
    <div class="hero-wrapper" id="heroWrapper">
        <div class="hero-content" id="heroContent">
            <!-- Date Badge -->
            <span class="date-badge" id="dateBadge">✦ July 20, 2026 ✦</span>

            <!-- Animated Title (words split by JS) -->
            <h1 class="hero-title" id="heroTitle">Happy Anniversary, Vaishnavi</h1>

            <!-- Subtitle -->
            <p class="hero-subtitle" id="heroSubtitle">Our first year together &mdash; and a lifetime to go</p>

            <!-- CTA Button -->
            <button
    class="cta-button"
    id="ctaButton"
    aria-label="Tap to Begin"
    onclick="window.location.href='main.html'">
    <span class="cta-pulse-ring" aria-hidden="true"></span>
    Tap to Begin
    <span class="cta-arrow">→</span>
</button>
        </div>
    </div>

    <!-- ════════════ Music Toggle Button ════════════ -->
    <button class="music-toggle" id="musicToggle" aria-label="Toggle ambient music" title="Toggle Music">
        <span class="music-icon">🎵</span>
    </button>

    <!-- ════════════ Glass Bottom Navigation ════════════ -->
    <nav class="bottom-nav" id="bottomNav" aria-label="Page navigation" role="navigation">
        <span class="nav-label">Enter</span>
        <span class="nav-dot active" aria-hidden="true"></span>
        <span class="nav-dot" aria-hidden="true"></span>
        <span class="nav-dot" aria-hidden="true"></span>
        <span class="nav-label">Site</span>
    </nav>

    <!-- ════════════ Custom Sparkle Cursor ════════════ -->
    <div class="cursor-dot" id="cursorDot" aria-hidden="true"></div>
    <div class="cursor-ring" id="cursorRing" aria-hidden="true"></div>

    <!-- ════════════ Transition Overlay ════════════ -->
    <div class="transition-overlay" id="transitionOverlay" aria-hidden="true"></div>

    <!-- ════════════ Hidden Audio Element (add your audio file here) ════════════ -->
    <!--
    <audio id="ambientAudio" loop preload="auto" volume="0.3">
    <source src="your-ambient-music.mp3" type="audio/mpeg">
</audio>
-->
<!--
    To add music:
    1. Place your audio file (e.g., soft-piano.mp3) in the same folder
    2. Uncomment the <audio> element above
    3. Update the src path
    4. The music toggle button will control playback
-->

<script>
    (function() {
        'use strict';

        // ──────────────── DOM References ────────────────
        const body = document.body;
        const cursorDot = document.getElementById('cursorDot');
        const cursorRing = document.getElementById('cursorRing');
        const floatingContainer = document.getElementById('floatingContainer');
        const heroTitle = document.getElementById('heroTitle');
        const dateBadge = document.getElementById('dateBadge');
        const heroSubtitle = document.getElementById('heroSubtitle');
        const ctaButton = document.getElementById('ctaButton');
        const musicToggle = document.getElementById('musicToggle');
        const bottomNav = document.getElementById('bottomNav');
        const transitionOverlay = document.getElementById('transitionOverlay');
        const heroWrapper = document.getElementById('heroWrapper');

        // ──────────────── State ────────────────
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let cursorX = mouseX;
        let cursorY = mouseY;
        let isHovering = false;
        let rafId = null;
        let musicOn = false;
        let audioElement = null;
        let floatingEls = [];
        const isMobile = window.innerWidth <= 768 || ('ontouchstart' in window && window.innerWidth <= 1024);
        const sparkleColors = ['#f2b8a2', '#efc8c2', '#c88b7a', '#faf6f0', '#fffdf8', '#fadbd8', '#f7c5b5'];
        let sparkleThrottle = 0;

        // ──────────────── Try to get audio element ────────────────
        audioElement = document.getElementById('ambientAudio');
        if (audioElement) {
            audioElement.volume = 0.25;
        }

        // ──────────────── Populate Floating Decorations ────────────────
        function createFloatingElements() {
            if (!floatingContainer) return;
            const elements = [
                { emoji: '❤️', depth: 0.08, size: '1.4rem', opacity: 0.45, blur: '0px' },
                { emoji: '💕', depth: 0.06, size: '1.1rem', opacity: 0.35, blur: '0.3px' },
                { emoji: '💖', depth: 0.1, size: '1.3rem', opacity: 0.4, blur: '0px' },
                { emoji: '🩷', depth: 0.07, size: '1rem', opacity: 0.38, blur: '0.4px' },
                { emoji: '🍒', depth: 0.09, size: '1.2rem', opacity: 0.42, blur: '0px' },
                { emoji: '✨', depth: 0.04, size: '0.9rem', opacity: 0.5, blur: '0.6px' },
                { emoji: '⭐', depth: 0.03, size: '0.8rem', opacity: 0.4, blur: '0.8px' },
                { emoji: '💫', depth: 0.05, size: '1rem', opacity: 0.45, blur: '0.5px' },
                { emoji: '💌', depth: 0.11, size: '1.5rem', opacity: 0.38, blur: '0px' },
                { emoji: '🌸', depth: 0.07, size: '1.3rem', opacity: 0.4, blur: '0.2px' },
                { emoji: '🌷', depth: 0.06, size: '1.1rem', opacity: 0.35, blur: '0.3px' },
                { emoji: '🪷', depth: 0.05, size: '1.2rem', opacity: 0.38, blur: '0.4px' },
                { emoji: '✿', depth: 0.08, size: '0.9rem', opacity: 0.42, blur: '0.1px' },
                { emoji: '💐', depth: 0.1, size: '1.4rem', opacity: 0.36, blur: '0px' },
                { emoji: '🤍', depth: 0.04, size: '0.85rem', opacity: 0.4, blur: '0.7px' },
                { emoji: '🕊️', depth: 0.06, size: '1.2rem', opacity: 0.33, blur: '0.3px' },
                { emoji: '🎀', depth: 0.09, size: '1.1rem', opacity: 0.4, blur: '0px' },
                { emoji: '💝', depth: 0.1, size: '1.35rem', opacity: 0.37, blur: '0px' },
                { emoji: '✦', depth: 0.03, size: '0.7rem', opacity: 0.5, blur: '1px' },
                { emoji: '✧', depth: 0.04, size: '0.75rem', opacity: 0.45, blur: '0.9px' },
                { emoji: '🍒', depth: 0.08, size: '1.15rem', opacity: 0.4, blur: '0.1px' },
                { emoji: '💌', depth: 0.12, size: '1.6rem', opacity: 0.35, blur: '0px' },
                { emoji: '❤️', depth: 0.07, size: '1.25rem', opacity: 0.42, blur: '0.2px' },
                { emoji: '✨', depth: 0.05, size: '0.95rem', opacity: 0.48, blur: '0.4px' },
            ];

            // Reduce count on mobile for performance
            const count = isMobile ? Math.floor(elements.length * 0.55) : elements.length;
            const selected = elements.slice(0, count);

            selected.forEach(function(el, i) {
                const span = document.createElement('span');
                span.classList.add('floating-el');
                span.textContent = el.emoji;
                span.setAttribute('data-depth', el.depth);
                span.style.cssText = `
                    --el-size: ${el.size};
                    --el-opacity: ${el.opacity};
                    --blur: ${el.blur};
                    --dur: ${(Math.random() * 6) + 8}s;
                    --delay: ${Math.random() * 8}s;
                    --drift-y: ${(Math.random() * 60) + 30}px;
                    --drift-x: ${(Math.random() * 40) - 20}px;
                    --rotate: ${(Math.random() * 20) - 10}deg;
                    left: ${Math.random() * 85}%;
                    top: ${Math.random() * 85}%;
                    font-size: var(--el-size);
                    opacity: var(--el-opacity);
                    filter: blur(var(--blur));
                `;
                floatingContainer.appendChild(span);
                floatingEls.push(span);
            });
        }
        createFloatingElements();

        // ──────────────── Split Title into Words ────────────────
        function splitTitleIntoWords() {
            if (!heroTitle) return;
            const rawText = heroTitle.textContent.trim();
            const words = rawText.split(/\s+/);
            heroTitle.textContent = ''; // Clear

            words.forEach(function(word, i) {
                const span = document.createElement('span');
                span.classList.add('word');
                span.textContent = word;
                // The last word (name) gets a highlight
                if (i === words.length - 1) {
                    span.classList.add('highlight');
                }
                heroTitle.appendChild(span);
                // Add a space after each word except the last
                if (i < words.length - 1) {
                    heroTitle.appendChild(document.createTextNode(' '));
                }
            });
        }
        splitTitleIntoWords();

        // ──────────────── GSAP Entrance Animations ────────────────
        function runEntranceAnimations() {
            if (typeof gsap === 'undefined') {
                // Fallback: show everything immediately
                document.querySelectorAll('.word, #dateBadge, #heroSubtitle, #ctaButton, .music-toggle, #bottomNav')
                    .forEach(function(el) {
                        if (el) el.style.opacity = '1';
                    });
                document.querySelectorAll('.word').forEach(function(w) {
                    w.style.transform = 'translateY(0)';
                    w.style.opacity = '1';
                });
                return;
            }

            const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

            // 1. Date badge fades in
            tl.to(dateBadge, {
                opacity: 1,
                y: 0,
                duration: 0.7,
                ease: 'power2.out',
            }, 0.15);

            // 2. Title words animate word by word
            const wordEls = heroTitle ? heroTitle.querySelectorAll('.word') : [];
            if (wordEls.length > 0) {
                tl.to(wordEls, {
                    opacity: 1,
                    y: 0,
                    duration: 0.65,
                    stagger: 0.18,
                    ease: 'back.out(1.3)',
                }, 0.35);
            }

            // 3. Subtitle fades in after words
            tl.to(heroSubtitle, {
                opacity: 1,
                y: 0,
                duration: 0.7,
                ease: 'power2.out',
            }, 0.85);

            // 4. CTA button appears with a gentle scale bounce
            tl.to(ctaButton, {
                opacity: 1,
                scale: 1,
                duration: 0.8,
                ease: 'elastic.out(1, 0.7)',
            }, 1.1);

            // 5. Music toggle fades in
            tl.to(musicToggle, {
                opacity: 1,
                duration: 0.5,
                ease: 'power2.out',
            }, 1.2);

            // 6. Bottom nav slides up
            tl.to(bottomNav, {
                opacity: 1,
                y: 0,
                duration: 0.6,
                ease: 'power2.out',
            }, 1.3);

            // 7. Make hero title visible container
            if (heroTitle) {
                tl.set(heroTitle, { opacity: 1 }, 0.35);
            }
        }

        // Set initial states for GSAP
        if (dateBadge) dateBadge.style.opacity = '0';
        if (heroSubtitle) heroSubtitle.style.opacity = '0';
        if (ctaButton) { ctaButton.style.opacity = '0';
            ctaButton.style.transform = 'scale(0.85)'; }
        if (musicToggle) musicToggle.style.opacity = '0';
        if (bottomNav) { bottomNav.style.opacity = '0';
            bottomNav.style.transform = 'translateX(-50%) translateY(16px)'; }
        if (heroTitle) heroTitle.style.opacity = '0';

        // Run after a tiny delay to ensure DOM is fully ready
        setTimeout(runEntranceAnimations, 200);

        // ──────────────── Sparkle Particles ────────────────
        function createSparkle(x, y) {
            if (isMobile) return;
            if (sparkleThrottle > Date.now() - 28) return;
            sparkleThrottle = Date.now();
            const particle = document.createElement('div');
            particle.classList.add('sparkle-particle');
            const size = Math.random() * 4.5 + 2;
            const sx = (Math.random() - 0.5) * 38;
            const sy = (Math.random() - 0.5) * 38 - 14;
            particle.style.cssText = `
                left:${x}px;
                top:${y}px;
                width:${size}px;
                height:${size}px;
                background:${sparkleColors[Math.floor(Math.random() * sparkleColors.length)]};
                --sx:${sx}px;
                --sy:${sy}px;
                box-shadow: 0 0 ${size * 3}px ${sparkleColors[Math.floor(Math.random() * sparkleColors.length)]};
            `;
            body.appendChild(particle);
            requestAnimationFrame(function() {
                particle.addEventListener('animationend', function() { particle.remove(); }, { once: true });
                setTimeout(function() { if (particle.parentNode) particle.remove(); }, 750);
            });
        }

        // ──────────────── Custom Cursor Loop ────────────────
        function updateCursor() {
            if (isMobile) return;
            const dx = mouseX - cursorX;
            const dy = mouseY - cursorY;
            cursorX += dx * 0.22;
            cursorY += dy * 0.22;

            if (cursorDot) {
                cursorDot.style.left = mouseX + 'px';
                cursorDot.style.top = mouseY + 'px';
            }
            if (cursorRing) {
                cursorRing.style.left = cursorX + 'px';
                cursorRing.style.top = cursorY + 'px';
            }
            if (Math.abs(dx) > 1.5 || Math.abs(dy) > 1.5) {
                createSparkle(mouseX, mouseY);
            }
        }

        function cursorLoop() {
            updateCursor();
            rafId = requestAnimationFrame(cursorLoop);
        }

        if (!isMobile && cursorDot && cursorRing) {
            rafId = requestAnimationFrame(cursorLoop);
        }

        // ──────────────── Mouse Move Handler ────────────────
        document.addEventListener('mousemove', function(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;

            // Parallax on floating elements based on mouse position
            if (floatingEls.length > 0 && !isMobile) {
                const vw = window.innerWidth;
                const vh = window.innerHeight;
                const relX = (mouseX / vw - 0.5) * 2; // -1 to 1
                const relY = (mouseY / vh - 0.5) * 2;

                floatingEls.forEach(function(el) {
                    const depth = parseFloat(el.getAttribute('data-depth')) || 0.06;
                    const offsetX = relX * depth * 55;
                    const offsetY = relY * depth * 45;
                    // Apply via style for smoothness (GSAP would be heavier for 24+ elements)
                    el.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
                });
            }
        }, { passive: true });

        // ──────────────── Hover Detection for Cursor ────────────────
        document.addEventListener('mouseover', function(e) {
            if (isMobile) return;
            const target = e.target;
            const isInteractive = target.closest(
                'button, a, .cta-button, .music-toggle, .nav-dot, .bottom-nav, [role="button"]');
            if (isInteractive && !isHovering) {
                isHovering = true;
                if (cursorDot) cursorDot.classList.add('hovering');
                if (cursorRing) cursorRing.classList.add('hovering');
            }
        });

        document.addEventListener('mouseout', function(e) {
            if (isMobile) return;
            const target = e.target;
            const related = e.relatedTarget;
            const wasInteractive = target.closest(
                'button, a, .cta-button, .music-toggle, .nav-dot, .bottom-nav, [role="button"]');
            const stillInteractive = related && related.closest(
                'button, a, .cta-button, .music-toggle, .nav-dot, .bottom-nav, [role="button"]');
            if (wasInteractive && !stillInteractive && isHovering) {
                isHovering = false;
                if (cursorDot) cursorDot.classList.remove('hovering');
                if (cursorRing) cursorRing.classList.remove('hovering');
            }
        });

        // ──────────────── CTA Button Click → Transition to story.html ────────────────
        function triggerTransition() {
            if (!ctaButton || !transitionOverlay) {
                // Fallback: direct navigation
                window.location.href = 'main.html';
                return;
            }

            // Get button center position
            const btnRect = ctaButton.getBoundingClientRect();
            const centerX = btnRect.left + btnRect.width / 2;
            const centerY = btnRect.top + btnRect.height / 2;

            // Position overlay at button center
            transitionOverlay.style.left = centerX + 'px';
            transitionOverlay.style.top = centerY + 'px';
            transitionOverlay.style.transform = 'translate(-50%, -50%) scale(0)';
            transitionOverlay.style.opacity = '0';
            transitionOverlay.classList.add('active');

            // Calculate scale needed to cover entire viewport
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            const diagonal = Math.sqrt(vw * vw + vh * vh);
            const baseSize = 120; // matches CSS width/height
            const targetScale = (diagonal / baseSize) * 1.3; // 30% extra for safety

            // Animate with GSAP
            if (typeof gsap !== 'undefined') {
                gsap.to(transitionOverlay, {
                    scale: targetScale,
                    opacity: 1,
                    duration: 0.75,
                    ease: 'power3.in',
                    onComplete: function() {
                        // Brief pause then navigate
                        setTimeout(function() {
                            window.location.href = 'main.html';
                        }, 150);
                    },
                });
            } else {
                // Fallback without GSAP
                transitionOverlay.style.transition = 'transform 0.7s ease-in, opacity 0.7s ease-in';
                transitionOverlay.style.transform = `translate(-50%, -50%) scale(${targetScale})`;
                transitionOverlay.style.opacity = '1';
                setTimeout(function() {
                    window.location.href = 'main.html';
                }, 800);
            }
        }

        if (ctaButton) {
            ctaButton.addEventListener('click', function(e) {
                e.preventDefault();
                // Brief haptic-like visual feedback
                if (typeof gsap !== 'undefined') {
                    gsap.to(ctaButton, {
                        scale: 0.92,
                        duration: 0.1,
                        ease: 'power2.in',
                        onComplete: function() {
                            gsap.to(ctaButton, {
                                scale: 1.06,
                                duration: 0.35,
                                ease: 'elastic.out(1, 0.6)',
                            });
                        },
                    });
                }
                // Trigger the transition after a tiny delay
                setTimeout(triggerTransition, 120);
            });

            // Keyboard accessibility
            ctaButton.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    ctaButton.click();
                }
            });
        }

        // Also allow clicking the bottom nav to trigger transition
        if (bottomNav) {
            bottomNav.addEventListener('click', function(e) {
                if (e.target.closest('.nav-dot') || e.target.closest('.nav-label')) {
                    triggerTransition();
                }
            });
        }

        // ──────────────── Music Toggle ────────────────
        if (musicToggle) {
            musicToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                musicOn = !musicOn;

                if (musicOn) {
                    musicToggle.classList.add('active');
                    musicToggle.querySelector('.music-icon').textContent = '🎶';
                    musicToggle.setAttribute('aria-label', 'Music playing - click to pause');
                    // Try to play audio if available
                    if (audioElement) {
                        audioElement.play().catch(function() {
                            // Autoplay blocked, that's OK
                            console.log('Audio playback requires user interaction. Click again if needed.');
                        });
                    }
                } else {
                    musicToggle.classList.remove('active');
                    musicToggle.querySelector('.music-icon').textContent = '🎵';
                    musicToggle.setAttribute('aria-label', 'Music paused - click to play');
                    if (audioElement) {
                        audioElement.pause();
                    }
                }

                // Re-trigger note bounce animation
                const icon = musicToggle.querySelector('.music-icon');
                if (icon) {
                    icon.style.animation = 'none';
                    icon.offsetHeight; // reflow
                    icon.style.animation = '';
                    if (musicOn) {
                        icon.style.animation = 'noteBounce 0.6s ease-in-out';
                    }
                }
            });

            musicToggle.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    musicToggle.click();
                }
            });
        }

        // ──────────────── Resize Handler ────────────────
        let resizeTimeout;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(function() {
                const nowMobile = window.innerWidth <= 768;
                if (nowMobile && rafId) {
                    cancelAnimationFrame(rafId);
                    rafId = null;
                    if (cursorDot) cursorDot.style.display = 'none';
                    if (cursorRing) cursorRing.style.display = 'none';
                } else if (!nowMobile && !rafId && cursorDot && cursorRing) {
                    cursorDot.style.display = '';
                    cursorRing.style.display = '';
                    rafId = requestAnimationFrame(cursorLoop);
                }
            }, 250);
        });

        // ──────────────── Keyboard Accessibility ────────────────
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && isHovering) {
                isHovering = false;
                if (cursorDot) cursorDot.classList.remove('hovering');
                if (cursorRing) cursorRing.classList.remove('hovering');
            }
            // Allow Enter on the entire page to trigger CTA
            if (e.key === 'Enter' && document.activeElement === body && ctaButton) {
                ctaButton.click();
            }
        });

        // ──────────────── Initialization Complete ────────────────
        console.log('%c🌸 Cinematic Entrance Ready %c| %cFor Vaishnavi %c💛',
            'font-size:1.1rem;color:#c88b7a;',
            '',
            'font-style:italic;color:#49362d;',
            '');
        console.log('%cEvery detail crafted with love. Tap to Begin the journey.',
            'color:#8b6f5e;font-size:0.85rem;');
        console.log('%c📅 July 20, 2026 — First Anniversary Celebration',
            'color:#c88b7a;font-weight:600;');

    })();
</script>
